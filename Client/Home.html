<div class="container" id="myGroup">

<div class="collapse" id="collapseAbout" data-parent="#myGroup">
  <div class="row ">
    <div class="col-lg-10 mx-auto">
      <div class="card mt-2 mx-auto p-4 bg-light">
          <div class="card-body bg-light">
           <h4>our goal goal is to make the sublet process in our comunnity easy and free</h4>
           <button onclick="collapseAll()" type="button" id ="close" class="btn btn-primary mt-2"  >close</button>
          </div>
      </div>
    </div>
</div>
</div>
<div class="collapse" id="collapseForm" data-parent="#myGroup">
  <div class="row ">
    <div class="col-lg-7 mx-auto">
      <div class="card mt-2 mx-auto p-4 bg-light">
          <div class="card-body bg-light">
     
          <div class = "container">
            <form onsubmit="return false" id="myform">
              <div class="controls">
              <div class="row">
                  <div class="col-md-6">
                      <div class="form-group">
                          <label for="form_name">your name</label>
                          <input id="form_name" type="text" name="name" class="form-control" placeholder="Please enter your name *" data-error="name is required." required>
                          
                      </div>
                  </div>
                  <div class="col-md-6">
                      <div class="form-group">
                          <label for="form_address">address</label>
                          <input id="form_address" type="text" name="surname" class="form-control" placeholder="Please enter your address*"  data-error="address is required." required>
                      </div>
                  </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="startDate">start date</label>
                        <input id="startDate" type="text" name="name" class="form-control" placeholder="Please enter start date *"  data-error="start date is required." autocomplete="off" required>       
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                      <label for="endDate">end date</label>
                      <input id="endDate" type="text" name="name" class="form-control" placeholder="Please enter end date *"  data-error="end date is required." autocomplete="off" required>
                    </div>
                </div>
            </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="text" id="phone" class="form-control" name="phone" placeholder="Please tour phone number' format:05********" pattern="[0]{1}[5]{1}[0-9]{1}[0-9]{7}" required>
                  </div>
              </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="form-group">
                        <label for="form_message">Message *</label>
                        <textarea id="form_message" name="message" class="form-control" placeholder="Write any other information here." rows="4" ></textarea>
                      </div>

                </div>
              </div>
                <div class="row">                   
                  <div class="col-md-12">  
                    <button type="submit" id ="submit" class="btn btn-primary mt-2">Submit</button>
                    <button onclick="collapseAll()" type="button" id ="close" class="btn btn-primary mt-2"  >close</button>
                  </div>
                </div>
      </div>
       </form>
      </div>
    </div> 
  </div>
</div>
  </div>
</div>
<div class="collapse" id="added" data-parent="#myGroup">
  <div class="row ">
    <div class="col-lg-7 mx-auto">
      <div class="card mt-2 mx-auto p-4 bg-light">
          <div class="card-body bg-light">
           <h4>your sublet added succucesfuly!</h4>
           <button onclick="collapseAll()" type="button" id ="close" class="btn btn-primary mt-2" >close</button>
          </div>
      </div>
    </div>
</div>
</div>
</div>
<div class="d-flex justify-content-center p-3">
    <h1>ongoing sublets</h1>
</div>
<div class="container-fluid">
<div class="row">
  <div class="col-md-9 p-5"> 
     <div id="calendar"></div>
  </div>
  <div class="col-md-3">
    <div class="collapse" id="collapseInfo" data-parent="#myGroup">
      <div class="row ">
        <div class="col-md-10 mx-auto">
          <div class="card mt-5 mx-auto p-4 bg-light">
              <div class="card-body bg-light">
              <div id="infoInner"><h4>click on event to get more information</h4></div>
            </div>
               <button onclick="collapseAll()" type="button" id ="close" class="btn btn-primary mt-2"  >close</button>
              </div>
          </div>
        </div>
    </div>
</div>
</div>
